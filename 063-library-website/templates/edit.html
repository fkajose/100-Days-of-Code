<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Rating</title>
  </head>
  <body>
    <h2>Book Name: {{ book.title }}</h2>
    <p>Current Rating: {{ book.rating }}/10</p>
    <form action="{{ url_for("edit", book_id=book.id) }}" method="POST">
      <input type="number" name="rating" min="0" max="10" step="0.1" placeholder="0.0"/>
      <button type="submit">Change Rating</button>
    </form>
  </body>
</html>
